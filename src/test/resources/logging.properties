# Java Logging Configuration
# Suppresses verbose DEBUG output from libraries

# Root logger level
.level=WARNING

# Suppress FreeMarker DEBUG logging
freemarker.cache.TemplateCache.level=ERROR
freemarker.level=ERROR

# Suppress other verbose components
org.testng.level=WARNING
org.apache.commons.level=WARNING
org.apache.http.level=ERROR
com.aventstack.level=WARNING

# Console handler configuration
java.util.logging.ConsoleHandler.level=WARNING
java.util.logging.ConsoleHandler.formatter=java.util.logging.SimpleFormatter
java.util.logging.SimpleFormatter.format=[%1$tF %1$tT] %4$s: %5$s%n
